# Alertmanager Configuration
#
# Routes alerts from Prometheus to notification channels based on severity,
# component, and team ownership.
#
# Customize:
#   - Replace placeholder URLs/keys with your actual service credentials
#   - Adjust route matching and grouping to fit your team structure
#   - Modify time intervals for your on-call schedule

global:
  resolve_timeout: 5m
  # CUSTOMIZE: Replace with your SMTP server settings
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "alertmanager@example.com"
  smtp_auth_username: "alertmanager@example.com"
  smtp_auth_password: "<SMTP_PASSWORD>"
  smtp_require_tls: true
  # CUSTOMIZE: Replace with your Slack webhook URL
  slack_api_url: "https://hooks.slack.com/services/<YOUR>/<SLACK>/<WEBHOOK>"
  # CUSTOMIZE: Replace with your PagerDuty URL (usually default)
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

# Route tree - determines which receiver handles each alert
route:
  receiver: default
  group_by: ["alertname", "component"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

  routes:
    # Critical alerts -> PagerDuty + Slack
    - match:
        severity: critical
      receiver: pagerduty-critical
      group_wait: 10s
      repeat_interval: 4h
      continue: true

    - match:
        severity: critical
      receiver: slack-critical

    # Security alerts -> dedicated security team channel
    - match_re:
        alertname: ".*(Security|Auth|Certificate).*"
      receiver: security-team
      group_by: ["alertname"]
      repeat_interval: 1h

    # Warning alerts -> Slack warnings channel
    - match:
        severity: warning
      receiver: slack-warnings

    # Info alerts -> default (email digest)
    - match:
        severity: info
      receiver: default

# Inhibition rules - suppress lower-severity alerts when higher-severity
# alerts are already firing for the same component
inhibit_rules:
  # Suppress warnings when critical is firing for the same alertname
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["alertname"]

  # Suppress info when warning is firing for the same component
  - source_matchers:
      - severity = warning
    target_matchers:
      - severity = info
    equal: ["component"]

  # Suppress all container alerts when metrics are missing
  - source_matchers:
      - alertname = ContainerMetricsMissing
    target_matchers:
      - component =~ "build|runtime|resources"

# Time intervals for business-hours routing
time_intervals:
  - name: business-hours
    time_intervals:
      - weekdays: ["monday:friday"]
        times:
          - start_time: "09:00"
            end_time: "17:00"

  - name: outside-business-hours
    time_intervals:
      - weekdays: ["monday:friday"]
        times:
          - start_time: "17:00"
            end_time: "09:00"
      - weekdays: ["saturday", "sunday"]

# Receivers - notification endpoints
receivers:
  - name: default
    email_configs:
      # CUSTOMIZE: Replace with your team email
      - to: "platform-team@example.com"
        send_resolved: true

  - name: pagerduty-critical
    pagerduty_configs:
      # CUSTOMIZE: Replace with your PagerDuty integration key
      - service_key: "<PAGERDUTY_SERVICE_KEY>"
        severity: critical
        description: "{{ .CommonAnnotations.summary }}"
        details:
          firing: '{{ template "pagerduty.default.description" . }}'

  - name: slack-critical
    slack_configs:
      - channel: "#container-alerts-critical"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}CRITICAL{{ else }}RESOLVED{{ end }}: {{ .CommonAnnotations.summary }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}

  - name: slack-warnings
    slack_configs:
      - channel: "#container-alerts"
        send_resolved: true
        title: "{{ .CommonAnnotations.summary }}"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

  - name: security-team
    slack_configs:
      # CUSTOMIZE: Replace with your security team's channel
      - channel: "#security-alerts"
        send_resolved: true
        title: "SECURITY: {{ .CommonAnnotations.summary }}"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
    email_configs:
      # CUSTOMIZE: Replace with your security team email
      - to: "security-team@example.com"
        send_resolved: true
