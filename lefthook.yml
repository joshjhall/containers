# Lefthook configuration
# Install hooks: lefthook install
# Run manually:  lefthook run pre-commit [--all-files]
# Update tools:  edit this file (tool versions pinned in features/dev-tools.sh)
#
# Replaces .pre-commit-config.yaml. Lefthook is a Go binary with no Python
# runtime dependency — installed via dev-tools feature.

# ============================================================================
# Pre-commit stage: runs on `git commit`
# ============================================================================
pre-commit:
  parallel: true
  commands:

    # --- General file checks (native shell, no Python runtime) ---
    # YAML/JSON/private-key checks are covered elsewhere: dprint-yaml, biome-json,
    # and gitleaks (all defined below).
    trailing-whitespace:
      glob: "*"
      exclude:
        - "tests/results/**"
        - "bin/igor"
        - "lib/gpg-keys/**"
      run: bin/fix-trailing-whitespace.sh {staged_files}
      stage_fixed: true

    end-of-file-fixer:
      glob: "*"
      exclude:
        - "tests/results/**"
        - "bin/igor"
        - "lib/gpg-keys/**"
      run: bin/fix-end-of-file.sh {staged_files}
      stage_fixed: true

    check-added-large-files:
      exclude:
        - "bin/igor"
      run: |
        max=512000  # 500 KB (matches prior --maxkb=500)
        fail=0
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          size=$(/usr/bin/wc -c < "$f")
          if [ "$size" -gt "$max" ]; then
            echo "ERROR: $f is $size bytes (max: $max)"
            fail=1
          fi
        done
        exit "$fail"

    check-merge-conflict:
      exclude:
        # Skill template documents literal conflict-marker examples in a code fence
        - "lib/features/templates/claude/skills/rebase-imports/SKILL.md"
      run: |
        if /usr/bin/grep -lE '^(<{7} |>{7} |={7}$)' {staged_files} 2>/dev/null; then
          echo "ERROR: merge conflict markers found in the above file(s)"
          exit 1
        fi

    # --- Shell linting (direct binary from dev-tools) ---

    shellcheck:
      glob: "*.sh"
      exclude:
        - "tests/results/**"
      run: shellcheck --severity=warning {staged_files}

    shfmt:
      glob: "*.sh"
      exclude:
        - "tests/results/**"
      run: shfmt -w -i 4 -ci {staged_files}
      stage_fixed: true

    # --- YAML formatting (dprint + g-plane/pretty_yaml) ---

    dprint-yaml:
      glob: "*.{yml,yaml}"
      exclude:
        - "tests/results/**"
      run: dprint fmt {staged_files}
      stage_fixed: true

    # --- Markdown formatting and linting ---

    dprint-md:
      glob: "*.md"
      exclude:
        - "CHANGELOG.md"
        - "tests/results/**"
      run: dprint fmt {staged_files}
      stage_fixed: true

    mado:
      glob: "*.md"
      exclude:
        - "CHANGELOG.md"
        - "tests/results/**"
      run: mado check {staged_files}

    # Prose linting — warn-only. Skips until `vale sync` has fetched styles.
    vale:
      glob: "*.md"
      exclude:
        - "CHANGELOG.md"
        - "tests/results/**"
      skip:
        - run: "! command -v vale >/dev/null 2>&1"
        - run: "[ ! -d .vale/styles/write-good ]"
      run: vale --no-wrap {staged_files} || true

    # --- JSON linting with Biome ---

    biome-json:
      glob: "*.json"
      exclude:
        - "tests/results/**"
        - ".vscode/**"
        - ".devcontainer/**"
      run: biome check --write {staged_files}
      stage_fixed: true

    # --- Security ---

    gitleaks:
      # gitleaks is shipped by the dev-tools feature; skip gracefully if
      # running outside a dev-tools container (e.g., CI linting host).
      skip:
        - run: "! command -v gitleaks >/dev/null 2>&1"
      run: gitleaks protect --staged --verbose --redact

    # --- Rust linting (stibbons) ---

    cargo-fmt:
      glob: "{crates/**/*.rs,.rustfmt.toml,Cargo.toml}"
      run: cargo fmt --check

    cargo-clippy:
      glob: "{crates/**/*.rs,Cargo.toml}"
      run: cargo clippy --workspace -- -D warnings

    # --- Custom hooks ---

    no-env-file:
      run: |
        if git diff --cached --name-only | grep -q "^\.env$"; then
          echo "ERROR: .env file staged — refusing to commit"
          exit 1
        fi

    no-bashrc-heredocs:
      glob: "lib/features/*.sh"
      run: |
        if grep -rn "write_bashrc_content.*<<" {staged_files} 2>/dev/null; then
          echo "ERROR: Use file redirect instead of heredoc for write_bashrc_content"
          exit 1
        fi

    fix-shell-permissions:
      glob: "*.sh"
      run: bin/fix-shell-permissions.sh {staged_files}
      stage_fixed: true

    enforce-command-prefix:
      glob: "{lib,bin,tests}/**/*.sh"
      exclude:
        - "lib/features/lib/bashrc/**"
      run: bin/enforce-command-prefix.sh {staged_files}
      stage_fixed: true

# ============================================================================
# commit-msg stage: validates the message before the commit lands
# ============================================================================
commit-msg:
  commands:
    conform:
      # conform is shipped by the dev-tools feature; skip gracefully if
      # running outside a dev-tools container (e.g., a lint-only host).
      skip:
        - run: "! command -v conform >/dev/null 2>&1"
      run: conform enforce --commit-msg-file {1}

# ============================================================================
# Pre-push stage: runs on `git push`
# ============================================================================
pre-push:
  parallel: true
  commands:
    unit-tests:
      run: ./tests/run_changed_tests.sh

    cargo-test:
      glob: "{crates/**/*.rs,Cargo.toml}"
      run: cargo test --workspace

    docker-compose-validate:
      run: |
        for f in $(git ls-files "*compose*.yml" "*compose*.yaml" 2>/dev/null); do
          [ -f "$f" ] && docker compose -f "$f" config >/dev/null || exit 1
        done

    dprint-yaml-check:
      glob: "*.{yml,yaml}"
      run: dprint check {all_files}

    # --- Dependency CVE scanning ---

    osv-scanner:
      # osv-scanner is shipped by the dev-tools feature; skip gracefully
      # if running outside a dev-tools container.
      skip:
        - run: "! command -v osv-scanner >/dev/null 2>&1"
      run: osv-scanner --lockfile Cargo.lock
