# context-security — Phase-to-Skill Mapping
#
# Defines which skills are activated in each pipeline phase when the
# security context is active. The pipeline orchestrator reads this file
# to inject domain-specific expertise.
#
# Override by placing a modified copy in your project's
# .claude/skills/context-security/context.yml

name: security
description: "Authentication, authorization, secrets, and input validation concerns"

phases:
  plan:
    # Surface security requirements during planning
    - skill: loop-make-it-secure
      mode: guidance
      focus: "Plan must address: auth model, trust boundaries, secret storage, input validation strategy"

  implement:
    # Run security hardening loop after core loops
    - loop: loop-make-it-secure
      order: after-core
      focus: "Parameterized queries, externalized secrets, allowlist validation, output encoding"

  review:
    # Security-focused review checks (future check-sec-* skills)
    - skill: check-sec-injection
      status: planned
    - skill: check-sec-dependencies
      status: planned

  test:
    # Shape testing focus toward security concerns
    - skill: loop-make-it-tested
      focus: "Include injection attempts, auth boundary tests, permission escalation tests"

  docs:
    # Shape documentation toward security decisions
    - skill: loop-make-it-documented
      focus: "Document security decisions, auth flows, trust boundaries, key rotation procedures"
