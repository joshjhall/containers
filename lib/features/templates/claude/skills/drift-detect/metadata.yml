name: drift-detect
version: "1.0"
labels: []
required_tools:
  - name: git
    purpose: "Compare planned vs actual file changes"
    install_hint: "Included in base container image"
  - name: gh
    purpose: "Fetch issue body from GitHub (alternative: glab for GitLab)"
    install_hint: "Included when INCLUDE_DEV_TOOLS=true"
required_permissions:
  - provider: github
    scopes:
      - repo
    notes: "Needed to read issue body via gh issue view"
required_mcps: []
