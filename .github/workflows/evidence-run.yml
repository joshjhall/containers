name: Evidence Run

# Evidence-run workflow (sub-issue D of #473 — matrix + tier integration).
# Builds `luggage` + `record-evidence` from this repo, runs a tool install
# against a published, signed base image at its digest, records a
# TestEntry-shaped row, and hands it to `bin/ingest-evidence.sh` for
# delivery into `joshjhall/containers-db`.
#
# Triggers (all path-scoped to evidence-relevant sources):
#   - pull_request → main : run the matrix in DRY-RUN (validate the row
#     merges cleanly). Fork-safe — needs no secrets.
#   - push → main         : run the matrix and open a real PR against
#     containers-db (requires the `CONTAINERS_DB_PAT` secret).
#   - workflow_dispatch   : ad-hoc single run; the `dry_run` input chooses.
# No cron: per #473, while the catalog is small "just enumerate" beats
# sampling, so the matrix is exhaustive and event-driven.
#
# A `setup` job resolves the matrix (a single input-derived leg for
# dispatch, the enumerated pilot legs for PR/push) and the effective
# dry-run flag, so the `evidence` job body is identical across events.
# Per-leg coordinates are read into `env:` rather than interpolated into
# `run:` scripts — the same guardrail the dispatch prototype used.
#
# Flow per matrix leg:
#   1. Build `luggage` and `record-evidence` from this repo (static musl).
#   2. Pull the base image and capture its `sha256:` digest.
#   3. Run `luggage install <tool>@<version> --json-report` inside the
#      image (binary mounted from the runner per the
#      luggage-release-deferred convention).
#   4. Run `record-evidence` to assemble the TestEntry-shaped row.
#   5. Hand the row to `bin/ingest-evidence.sh` — a dry-run validate, or a
#      real cross-repo push + PR when dry-run is false.

on:
  workflow_dispatch:
    inputs:
      tool:
        description: "Tool slug in containers-db (e.g. rust)"
        required: true
        default: "rust"
      tool_version:
        description: "Tool version (must have a tools/<tool>/versions/<v>.json)"
        required: true
        default: "1.95.0"
      tuple:
        description: "Base image tuple slug"
        required: true
        default: "debian-12-amd64"
        type: choice
        options:
          - debian-12-amd64
          # arm64 is wired end-to-end but no arm64 base image is published
          # yet (#432/#434/#436). Selecting it will fail at "Resolve base
          # image digest" until that image lands — kept here so the arch
          # plumbing is exercised by dispatch once it does.
          - debian-12-arm64
      image_tag:
        description: "Base image tag to pull"
        required: true
        default: "latest"
      dry_run:
        description: "Skip the actual cross-repo push and PR open"
        required: true
        default: true
        type: boolean
  pull_request:
    branches: [main]
    paths:
      - "crates/luggage/**"
      - "crates/record-evidence/**"
      - "crates/containers-common/**"
      - "base-images/**"
      - "bin/ingest-evidence.sh"
      - ".github/workflows/evidence-run.yml"
  push:
    branches: [main]
    paths:
      - "crates/luggage/**"
      - "crates/record-evidence/**"
      - "crates/containers-common/**"
      - "base-images/**"
      - "bin/ingest-evidence.sh"
      - ".github/workflows/evidence-run.yml"

permissions:
  contents: read

# Serialize runs on the same ref so two pushes to main don't race to open
# duplicate containers-db PRs. Don't cancel an in-flight run — an
# interrupted ingest could leave a half-pushed branch behind.
concurrency:
  group: evidence-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # Resolve the matrix and the effective dry-run flag once, so the
  # `evidence` job body is event-agnostic:
  #   - workflow_dispatch: a single leg built from the inputs; dry-run
  #     follows the `dry_run` input.
  #   - pull_request: the enumerated pilot legs in dry-run (validate only).
  #   - push → main: the enumerated pilot legs with a real ingest.
  setup:
    name: Resolve matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      dry_run: ${{ steps.gen.outputs.dry_run }}
    steps:
      - name: Generate matrix and dry-run flag
        id: gen
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TOOL: ${{ inputs.tool }}
          INPUT_TOOL_VERSION: ${{ inputs.tool_version }}
          INPUT_TUPLE: ${{ inputs.tuple }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          # Map an arch token to its build/run plumbing. The tuple is the
          # single source of truth for arch (the row's recorded arch comes
          # from the in-job tuple split); runner/runtime/rust_target are its
          # build-plumbing companions, set together here so `runs-on:` and the
          # toolchain `targets:` can read them at job-eval time.
          #   native   → arch-matched runner, no docker --platform.
          #   emulated → ubuntu-latest + QEMU + docker run --platform.
          arch_plumbing() {
            case "$1" in
              amd64) echo "ubuntu-latest native x86_64-unknown-linux-musl" ;;
              arm64) echo "ubuntu-24.04-arm native aarch64-unknown-linux-musl" ;;
              *) echo "Unsupported arch: $1" >&2; return 1 ;;
            esac
          }
          if [ "$EVENT" = "workflow_dispatch" ]; then
            ARCH="${INPUT_TUPLE##*-}"
            # Capture-then-read with an explicit guard so an unsupported arch
            # aborts here with arch_plumbing's clear error. A bare
            # `read < <(arch_plumbing …)` (or an unguarded `$(…)` assignment)
            # swallows the non-zero exit and would emit a matrix with empty
            # runner/runtime/target, failing later with an opaque
            # runner-resolution error instead.
            PLUMBING=$(arch_plumbing "$ARCH") || { echo "Cannot resolve plumbing for arch: $ARCH" >&2; exit 1; }
            read -r RUNNER RUNTIME RUST_TARGET <<< "$PLUMBING"
            MATRIX=$(jq -cn \
              --arg tool "$INPUT_TOOL" \
              --arg version "$INPUT_TOOL_VERSION" \
              --arg tuple "$INPUT_TUPLE" \
              --arg image_tag "$INPUT_IMAGE_TAG" \
              --arg arch "$ARCH" \
              --arg runtime "$RUNTIME" \
              --arg runner "$RUNNER" \
              --arg rust_target "$RUST_TARGET" \
              '{include: [{tool: $tool, version: $version, tuple: $tuple, image_tag: $image_tag, arch: $arch, runtime: $runtime, runner: $runner, rust_target: $rust_target}]}')
            DRY="$INPUT_DRY_RUN"
          else
            # Pilot legs. Extend here (add tuples/tools) as base images
            # publish — the evidence job body needs no changes. Each leg
            # carries arch/runtime/runner/rust_target (see arch_plumbing).
            # The arm64 leg is wired but commented out: no arm64 base image
            # is published yet (#432/#434/#436). Uncomment it once the
            # base-debian-12-arm64 image lands — the job body needs no change.
            #   {"tool":"rust","version":"1.95.0","tuple":"debian-12-arm64","image_tag":"latest","arch":"arm64","runtime":"native","runner":"ubuntu-24.04-arm","rust_target":"aarch64-unknown-linux-musl"}
            MATRIX='{"include":[{"tool":"rust","version":"1.95.0","tuple":"debian-12-amd64","image_tag":"latest","arch":"amd64","runtime":"native","runner":"ubuntu-latest","rust_target":"x86_64-unknown-linux-musl"}]}'
            if [ "$EVENT" = "pull_request" ]; then
              DRY="true"
            else
              DRY="false"
            fi
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY" >> "$GITHUB_OUTPUT"

  # Coverage reconciliation — cross-check every version's `support_matrix`
  # `supported` claims against its `tested[]` evidence rows. Independent of the
  # matrix (no base image, no clone): runs against the vendored testdata
  # catalog so it stays hermetic and fork-safe. Report mode only — it surfaces
  # the claim-vs-evidence gap on every push/PR without blocking, because the
  # pilot produces only `debian-12-amd64` evidence and `--gate` over the real
  # catalog would be red on day one. Promote to `--gate` once the base-image
  # matrix covers the claimed cells. See docs/operations/evidence-runs.md
  # § Coverage reconciliation.
  reconcile:
    name: Reconcile coverage (report)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout containers
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: reconcile

      - name: Build luggage
        run: cargo build --release -p luggage

      - name: Reconcile claims against evidence (report)
        run: |
          ./target/release/luggage reconcile \
            --catalog crates/luggage/testdata/catalog

  evidence:
    name: Evidence ${{ matrix.tool }}@${{ matrix.version }} on ${{ matrix.tuple }}
    needs: setup
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    # issues: write is needed for the fail-row tracking-issue step below. Scoped
    # to this job (not the workflow root) so `setup` and `reconcile` stay
    # contents:read. The issue is filed on this repo, so the default
    # GITHUB_TOKEN suffices — no PAT (unlike the cross-repo ingest).
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      INPUT_TOOL: ${{ matrix.tool }}
      INPUT_TOOL_VERSION: ${{ matrix.version }}
      INPUT_TUPLE: ${{ matrix.tuple }}
      INPUT_IMAGE_TAG: ${{ matrix.image_tag }}
      # Arch plumbing from the leg (see the setup job's arch_plumbing). Read
      # into env rather than interpolated into run: scripts, per the file's
      # coordinates-into-env guardrail. ARCH here drives the build target and
      # the docker --platform flag; the row's recorded arch comes separately
      # from the tuple split (steps.tuple.outputs.arch) so the tuple stays the
      # single source of truth for evidence data.
      ARCH: ${{ matrix.arch }}
      RUNTIME: ${{ matrix.runtime }}
      RUST_TARGET: ${{ matrix.rust_target }}
    steps:
      - name: Checkout containers
        uses: actions/checkout@v4

      - name: Install Rust toolchain (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install musl linker
        run: |
          sudo apt-get install -y --no-install-recommends musl-tools
          # Emulated arm64 cross-compiles aarch64 musl from an amd64 host, so
          # it needs an aarch64 cross-linker. A native arm64 leg builds on an
          # arm64 runner (no cross-compile) and skips this. amd64 never needs it.
          if [ "$RUNTIME" = "emulated" ] && [ "$ARCH" = "arm64" ]; then
            sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
          fi

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Per-arch key so amd64 and arm64 build artifacts don't collide.
          key: musl-${{ matrix.arch }}

      # Build statically against musl so the produced binaries run inside
      # any base image (glibc 2.36 / 2.31 / alpine / RHEL) without a
      # glibc-version match against the runner. luggage's TLS path uses
      # rustls (pure Rust), so no native-tls/openssl configuration is
      # needed for the static link.
      - name: Build luggage and record-evidence (static musl)
        run: |
          # Cargo reads CARGO_TARGET_<triple>_LINKER only for the triple being
          # built, so the aarch64 linker only matters on an arm64 leg — and its
          # value differs by runtime: the emulated (cross-compile) leg needs the
          # aarch64 cross-gcc, while a native arm64 leg links with musl-gcc from
          # musl-tools (gcc-aarch64-linux-gnu is not installed there). amd64
          # sets nothing, leaving its build byte-identical to the pre-arch path.
          if [ "$ARCH" = "arm64" ]; then
            if [ "$RUNTIME" = "emulated" ]; then
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc
            else
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
            fi
          fi
          cargo build --release --target "$RUST_TARGET" \
            -p luggage -p record-evidence
          /bin/ls -l "target/$RUST_TARGET/release/luggage" \
                     "target/$RUST_TARGET/release/record-evidence"

      - name: Resolve base image digest
        id: digest
        env:
          REPO: ${{ github.repository }}
        run: |
          IMAGE="${REGISTRY}/${REPO}/base-${INPUT_TUPLE}:${INPUT_IMAGE_TAG}"
          docker pull "$IMAGE"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" | awk -F'@' '{print $2}')
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Resolved digest is not a sha256:<64 hex>: $DIGEST" >&2
            exit 1
          fi
          IMAGE_REF="${IMAGE%:*}"
          {
            echo "digest=$DIGEST"
            echo "image_ref=$IMAGE_REF"
          } >> "$GITHUB_OUTPUT"

      - name: Derive tuple coordinates
        id: tuple
        run: |
          # Split debian-12-amd64 -> os=debian os_version=12 arch=amd64
          IFS='-' read -ra parts <<< "$INPUT_TUPLE"
          if [ "${#parts[@]}" -ne 3 ]; then
            echo "Unexpected tuple shape: $INPUT_TUPLE (want <os>-<os_version>-<arch>)" >&2
            exit 1
          fi
          {
            echo "os=${parts[0]}"
            echo "os_version=${parts[1]}"
            echo "arch=${parts[2]}"
          } >> "$GITHUB_OUTPUT"

      # Single containers-db clone serves two consumers:
      #   1. luggage (below) reads `tools/<tool>/versions/<v>.json` to know
      #      *how* to install the tool — catalog mounted read-only into the
      #      docker container at /catalog.
      #   2. bin/ingest-evidence.sh (later) writes the new row to the same
      #      checkout and pushes a branch when dry_run=false.
      # Cloning once keeps these two consumers seeing the same catalog SHA
      # for the lifetime of the run.
      - name: Clone containers-db catalog
        run: |
          git clone --depth=1 https://github.com/joshjhall/containers-db.git _db
          test -f "_db/tools/${INPUT_TOOL}/versions/${INPUT_TOOL_VERSION}.json" || {
            echo "containers-db missing tools/${INPUT_TOOL}/versions/${INPUT_TOOL_VERSION}.json" >&2
            exit 1
          }

      # Register binfmt handlers so the amd64 runner can run a foreign-arch
      # (arm64) container. Only the emulated path needs this; a native leg
      # runs on an arch-matched runner and skips it.
      - name: Set up QEMU (emulated legs)
        if: ${{ matrix.runtime == 'emulated' }}
        uses: docker/setup-qemu-action@v3

      - name: Run luggage install inside the base image
        env:
          IMAGE: ${{ steps.digest.outputs.image_ref }}@${{ steps.digest.outputs.digest }}
        run: |
          mkdir -p out
          # Emulated legs pin the container platform so QEMU runs the foreign
          # arch; native legs leave the array empty (no --platform), which
          # makes the amd64 path byte-identical to the pre-arch behavior.
          PLATFORM_FLAGS=()
          if [ "$RUNTIME" = "emulated" ]; then
            PLATFORM_FLAGS=(--platform "linux/${ARCH}")
          fi
          # We don't fail the workflow on install failure — luggage's
          # --json-report writes a failure row too, which is the whole
          # point of an evidence run. The row's `result` field carries
          # the verdict.
          set +e
          # --user 0: base image defaults to a non-root USER (security
          # hardening), but luggage needs root to install rust system-wide
          # via rustup-init (writes to /usr/local/cargo) and to write the
          # report file to the runner-owned /out mount. Overriding USER
          # here is the "this is an install test, not a service" exception.
          # The mounted luggage binary runs INSIDE the container, so it is
          # built for the container arch ($RUST_TARGET) in both runtime modes.
          docker run --rm \
            "${PLATFORM_FLAGS[@]}" \
            --user 0 \
            -v "$PWD/target/$RUST_TARGET/release/luggage:/usr/local/bin/luggage:ro" \
            -v "$PWD/_db:/catalog:ro" \
            -v "$PWD/out:/out" \
            -e CONTAINERS_DB=/catalog \
            "$IMAGE" \
            luggage install "${INPUT_TOOL}@${INPUT_TOOL_VERSION}" --json-report /out/luggage-report.json
          INSTALL_RC=$?
          set -e
          echo "luggage exited with $INSTALL_RC"
          test -s out/luggage-report.json || {
            echo "luggage did not write a report" >&2
            exit 1
          }

      - name: Build evidence row
        env:
          IMAGE_REF: ${{ steps.digest.outputs.image_ref }}
          IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
          CI_RUN: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OS: ${{ steps.tuple.outputs.os }}
          OS_VERSION: ${{ steps.tuple.outputs.os_version }}
          ARCH: ${{ steps.tuple.outputs.arch }}
        run: |
          "./target/$RUST_TARGET/release/record-evidence" \
            --luggage-report out/luggage-report.json \
            --image-ref "$IMAGE_REF" \
            --image-digest "$IMAGE_DIGEST" \
            --ci-run "$CI_RUN" \
            --os "$OS" \
            --os-version "$OS_VERSION" \
            --arch "$ARCH" \
            > out/evidence-row.json
          jq . out/evidence-row.json

      # Surface the recorded verdict as step outputs so the fail-row
      # tracking-issue step can gate on it. The row's `result` and optional
      # `error_class` are written by record-evidence (see
      # crates/record-evidence/src/lib.rs); a pass/skip row has no error_class,
      # so default it to "unknown" to keep the issue body well-formed.
      - name: Read evidence verdict
        id: verdict
        run: |
          RESULT=$(jq -r '.result' out/evidence-row.json)
          ERROR_CLASS=$(jq -r '.error_class // "unknown"' out/evidence-row.json)
          {
            echo "result=$RESULT"
            echo "error_class=$ERROR_CLASS"
          } >> "$GITHUB_OUTPUT"

      - name: Upload evidence row
        uses: actions/upload-artifact@v4
        with:
          # Per-tuple name so parallel matrix legs don't collide —
          # upload-artifact@v4 rejects two uploads under one name. A downstream
          # consumer downloads all evidence-row-* artifacts.
          name: evidence-row-${{ matrix.tuple }}
          path: out/evidence-row.json
          if-no-files-found: error

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Ingest evidence (dry-run)
        if: ${{ needs.setup.outputs.dry_run == 'true' }}
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          mkdir -p _db
          ./bin/ingest-evidence.sh \
            --row out/evidence-row.json \
            --db-path "$PWD/_db" \
            --tool "$INPUT_TOOL" \
            --version "$INPUT_TOOL_VERSION" \
            --dry-run

      - name: Ingest evidence (PR open)
        if: ${{ needs.setup.outputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.CONTAINERS_DB_PAT }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "CONTAINERS_DB_PAT secret is not configured." >&2
            echo "See docs/operations/evidence-runs.md (Auth model) for setup." >&2
            exit 1
          fi
          mkdir -p _db
          # gh+git need the token on the HTTPS push as well.
          git config --global "url.https://x-access-token:${GH_TOKEN}@github.com/.insteadOf" "https://github.com/"
          ./bin/ingest-evidence.sh \
            --row out/evidence-row.json \
            --db-path "$PWD/_db" \
            --tool "$INPUT_TOOL" \
            --version "$INPUT_TOOL_VERSION"

      # A `result: fail` row is recorded as evidence but does not fail the job
      # (see "Run luggage install ..." above). Without this step the regression
      # would sit quiet in containers-db. Mirror the cadence tiers' (#464/#465)
      # search-or-create auto-issue convention so a broken tool@tuple gets
      # triaged. Pattern: security-scan.yml's tracking-issue step.
      #
      # Gated on dry_run != 'true' rather than github.event_name: the dry-run
      # flag is setup's single resolved source of truth, and PR legs are forced
      # to dry_run=true there — so this never fires on a fork-safe PR leg.
      - name: Open or update tracking issue on fail row
        if: ${{ steps.verdict.outputs.result == 'fail' && needs.setup.outputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ERROR_CLASS: ${{ steps.verdict.outputs.error_class }}
        run: |
          TITLE="Evidence regression: ${INPUT_TOOL}@${INPUT_TOOL_VERSION} on ${INPUT_TUPLE}"
          TODAY="$(date -u +%Y-%m-%d)"
          # audit/regression is the cadence-tier vocabulary but isn't a
          # pre-existing repo label — create it idempotently (same --force
          # pattern as auto-patch.yml's hold/review-required) so issue creation
          # never fails on a missing label.
          gh label create "audit/regression" \
            --description "Automated regression finding" \
            --color "B60205" --force
          BODY=$(cat <<EOF
          ## Evidence run recorded a \`fail\` row

          An evidence run installed \`${INPUT_TOOL}@${INPUT_TOOL_VERSION}\`
          against base image tuple \`${INPUT_TUPLE}\` and luggage reported a
          failure. The row was still recorded in containers-db as evidence;
          this issue tracks the regression.

          **Run:** ${RUN_URL}
          **error_class:** \`${ERROR_CLASS}\`
          **Recorded:** ${TODAY}

          <!-- managed-by: evidence-run.yml -->
          EOF
          )
          # Title keyed on (tool, version, tuple) — INPUT_TUPLE encodes
          # os-os_version-arch — so a re-failure on the same cell updates one
          # issue while a different distro/arch opens its own.
          EXISTING=$(gh issue list \
            --label "audit/regression" --state open \
            --search "\"${TITLE}\" in:title" \
            --json number --jq '.[0].number // empty')
          if [ -n "${EXISTING}" ]; then
            echo "Updating existing tracking issue #${EXISTING}"
            gh issue edit "${EXISTING}" --body "${BODY}"
            gh issue comment "${EXISTING}" \
              --body "Failed again on ${TODAY} (error_class \`${ERROR_CLASS}\`) — see ${RUN_URL}"
          else
            echo "Opening new tracking issue"
            gh issue create --title "${TITLE}" --body "${BODY}" \
              --label "severity/high" --label "type/bug" --label "audit/regression"
          fi
