name: Evidence Run

# Evidence-run workflow (sub-issue D of #473 — matrix + tier integration).
# Builds `luggage` + `record-evidence` from this repo, runs a tool install
# against a published, signed base image at its digest, records a
# TestEntry-shaped row, and hands it to `bin/ingest-evidence.sh` for
# delivery into `joshjhall/containers-db`.
#
# Triggers (all path-scoped to evidence-relevant sources):
#   - pull_request → main : run the matrix in DRY-RUN (validate the row
#     merges cleanly). Fork-safe — needs no secrets.
#   - push → main         : run the matrix and open a real PR against
#     containers-db (requires the `CONTAINERS_DB_PAT` secret).
#   - workflow_dispatch   : ad-hoc single run; the `dry_run` input chooses.
# No cron: per #473, while the catalog is small "just enumerate" beats
# sampling, so the matrix is exhaustive and event-driven.
#
# A `setup` job resolves the matrix (a single input-derived leg for
# dispatch, the enumerated pilot legs for PR/push) and the effective
# dry-run flag, so the `evidence` job body is identical across events.
# Per-leg coordinates are read into `env:` rather than interpolated into
# `run:` scripts — the same guardrail the dispatch prototype used.
#
# Flow per matrix leg:
#   1. Build `luggage` and `record-evidence` from this repo (static musl).
#   2. Pull the base image and capture its `sha256:` digest.
#   3. Run `luggage install <tool>@<version> --json-report` inside the
#      image (binary mounted from the runner per the
#      luggage-release-deferred convention).
#   4. Run `record-evidence` to assemble the TestEntry-shaped row.
#   5. Hand the row to `bin/ingest-evidence.sh` — a dry-run validate, or a
#      real cross-repo push + PR when dry-run is false.

on:
  workflow_dispatch:
    inputs:
      tool:
        description: "Tool slug in containers-db (e.g. rust)"
        required: true
        default: "rust"
      tool_version:
        description: "Tool version (must have a tools/<tool>/versions/<v>.json)"
        required: true
        default: "1.95.0"
      tuple:
        description: "Base image tuple slug"
        required: true
        default: "debian-12-amd64"
        type: choice
        options:
          - debian-12-amd64
      image_tag:
        description: "Base image tag to pull"
        required: true
        default: "latest"
      dry_run:
        description: "Skip the actual cross-repo push and PR open"
        required: true
        default: true
        type: boolean
  pull_request:
    branches: [main]
    paths:
      - "crates/luggage/**"
      - "crates/record-evidence/**"
      - "crates/containers-common/**"
      - "base-images/**"
      - "bin/ingest-evidence.sh"
      - ".github/workflows/evidence-run.yml"
  push:
    branches: [main]
    paths:
      - "crates/luggage/**"
      - "crates/record-evidence/**"
      - "crates/containers-common/**"
      - "base-images/**"
      - "bin/ingest-evidence.sh"
      - ".github/workflows/evidence-run.yml"

permissions:
  contents: read

# Serialize runs on the same ref so two pushes to main don't race to open
# duplicate containers-db PRs. Don't cancel an in-flight run — an
# interrupted ingest could leave a half-pushed branch behind.
concurrency:
  group: evidence-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # Resolve the matrix and the effective dry-run flag once, so the
  # `evidence` job body is event-agnostic:
  #   - workflow_dispatch: a single leg built from the inputs; dry-run
  #     follows the `dry_run` input.
  #   - pull_request: the enumerated pilot legs in dry-run (validate only).
  #   - push → main: the enumerated pilot legs with a real ingest.
  setup:
    name: Resolve matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      dry_run: ${{ steps.gen.outputs.dry_run }}
    steps:
      - name: Generate matrix and dry-run flag
        id: gen
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TOOL: ${{ inputs.tool }}
          INPUT_TOOL_VERSION: ${{ inputs.tool_version }}
          INPUT_TUPLE: ${{ inputs.tuple }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            MATRIX=$(jq -cn \
              --arg tool "$INPUT_TOOL" \
              --arg version "$INPUT_TOOL_VERSION" \
              --arg tuple "$INPUT_TUPLE" \
              --arg image_tag "$INPUT_IMAGE_TAG" \
              '{include: [{tool: $tool, version: $version, tuple: $tuple, image_tag: $image_tag}]}')
            DRY="$INPUT_DRY_RUN"
          else
            # Pilot legs. Extend here (add tuples/tools) as base images
            # publish — the evidence job body needs no changes.
            MATRIX='{"include":[{"tool":"rust","version":"1.95.0","tuple":"debian-12-amd64","image_tag":"latest"}]}'
            if [ "$EVENT" = "pull_request" ]; then
              DRY="true"
            else
              DRY="false"
            fi
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY" >> "$GITHUB_OUTPUT"

  evidence:
    name: Evidence ${{ matrix.tool }}@${{ matrix.version }} on ${{ matrix.tuple }}
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      INPUT_TOOL: ${{ matrix.tool }}
      INPUT_TOOL_VERSION: ${{ matrix.version }}
      INPUT_TUPLE: ${{ matrix.tuple }}
      INPUT_IMAGE_TAG: ${{ matrix.image_tag }}
    steps:
      - name: Checkout containers
        uses: actions/checkout@v4

      - name: Install Rust toolchain (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl linker
        run: sudo apt-get install -y --no-install-recommends musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: musl

      # Build statically against musl so the produced binaries run inside
      # any base image (glibc 2.36 / 2.31 / alpine / RHEL) without a
      # glibc-version match against the runner. luggage's TLS path uses
      # rustls (pure Rust), so no native-tls/openssl configuration is
      # needed for the static link.
      - name: Build luggage and record-evidence (static musl)
        run: |
          cargo build --release --target x86_64-unknown-linux-musl \
            -p luggage -p record-evidence
          ls -l target/x86_64-unknown-linux-musl/release/luggage \
                target/x86_64-unknown-linux-musl/release/record-evidence

      - name: Resolve base image digest
        id: digest
        env:
          REPO: ${{ github.repository }}
        run: |
          IMAGE="${REGISTRY}/${REPO}/base-${INPUT_TUPLE}:${INPUT_IMAGE_TAG}"
          docker pull "$IMAGE"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" | awk -F'@' '{print $2}')
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Resolved digest is not a sha256:<64 hex>: $DIGEST" >&2
            exit 1
          fi
          IMAGE_REF="${IMAGE%:*}"
          {
            echo "digest=$DIGEST"
            echo "image_ref=$IMAGE_REF"
          } >> "$GITHUB_OUTPUT"

      - name: Derive tuple coordinates
        id: tuple
        run: |
          # Split debian-12-amd64 -> os=debian os_version=12 arch=amd64
          IFS='-' read -ra parts <<< "$INPUT_TUPLE"
          if [ "${#parts[@]}" -ne 3 ]; then
            echo "Unexpected tuple shape: $INPUT_TUPLE (want <os>-<os_version>-<arch>)" >&2
            exit 1
          fi
          {
            echo "os=${parts[0]}"
            echo "os_version=${parts[1]}"
            echo "arch=${parts[2]}"
          } >> "$GITHUB_OUTPUT"

      # Single containers-db clone serves two consumers:
      #   1. luggage (below) reads `tools/<tool>/versions/<v>.json` to know
      #      *how* to install the tool — catalog mounted read-only into the
      #      docker container at /catalog.
      #   2. bin/ingest-evidence.sh (later) writes the new row to the same
      #      checkout and pushes a branch when dry_run=false.
      # Cloning once keeps these two consumers seeing the same catalog SHA
      # for the lifetime of the run.
      - name: Clone containers-db catalog
        run: |
          git clone --depth=1 https://github.com/joshjhall/containers-db.git _db
          test -f "_db/tools/${INPUT_TOOL}/versions/${INPUT_TOOL_VERSION}.json" || {
            echo "containers-db missing tools/${INPUT_TOOL}/versions/${INPUT_TOOL_VERSION}.json" >&2
            exit 1
          }

      - name: Run luggage install inside the base image
        env:
          IMAGE: ${{ steps.digest.outputs.image_ref }}@${{ steps.digest.outputs.digest }}
        run: |
          mkdir -p out
          # We don't fail the workflow on install failure — luggage's
          # --json-report writes a failure row too, which is the whole
          # point of an evidence run. The row's `result` field carries
          # the verdict.
          set +e
          # --user 0: base image defaults to a non-root USER (security
          # hardening), but luggage needs root to install rust system-wide
          # via rustup-init (writes to /usr/local/cargo) and to write the
          # report file to the runner-owned /out mount. Overriding USER
          # here is the "this is an install test, not a service" exception.
          docker run --rm \
            --user 0 \
            -v "$PWD/target/x86_64-unknown-linux-musl/release/luggage:/usr/local/bin/luggage:ro" \
            -v "$PWD/_db:/catalog:ro" \
            -v "$PWD/out:/out" \
            -e CONTAINERS_DB=/catalog \
            "$IMAGE" \
            luggage install "${INPUT_TOOL}@${INPUT_TOOL_VERSION}" --json-report /out/luggage-report.json
          INSTALL_RC=$?
          set -e
          echo "luggage exited with $INSTALL_RC"
          test -s out/luggage-report.json || {
            echo "luggage did not write a report" >&2
            exit 1
          }

      - name: Build evidence row
        env:
          IMAGE_REF: ${{ steps.digest.outputs.image_ref }}
          IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
          CI_RUN: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OS: ${{ steps.tuple.outputs.os }}
          OS_VERSION: ${{ steps.tuple.outputs.os_version }}
          ARCH: ${{ steps.tuple.outputs.arch }}
        run: |
          ./target/x86_64-unknown-linux-musl/release/record-evidence \
            --luggage-report out/luggage-report.json \
            --image-ref "$IMAGE_REF" \
            --image-digest "$IMAGE_DIGEST" \
            --ci-run "$CI_RUN" \
            --os "$OS" \
            --os-version "$OS_VERSION" \
            --arch "$ARCH" \
            > out/evidence-row.json
          jq . out/evidence-row.json

      - name: Upload evidence row
        uses: actions/upload-artifact@v4
        with:
          name: evidence-row
          path: out/evidence-row.json
          if-no-files-found: error

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Ingest evidence (dry-run)
        if: ${{ needs.setup.outputs.dry_run == 'true' }}
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          mkdir -p _db
          ./bin/ingest-evidence.sh \
            --row out/evidence-row.json \
            --db-path "$PWD/_db" \
            --tool "$INPUT_TOOL" \
            --version "$INPUT_TOOL_VERSION" \
            --dry-run

      - name: Ingest evidence (PR open)
        if: ${{ needs.setup.outputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.CONTAINERS_DB_PAT }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "CONTAINERS_DB_PAT secret is not configured." >&2
            echo "See docs/operations/evidence-runs.md (Auth model) for setup." >&2
            exit 1
          fi
          mkdir -p _db
          # gh+git need the token on the HTTPS push as well.
          git config --global "url.https://x-access-token:${GH_TOKEN}@github.com/.insteadOf" "https://github.com/"
          ./bin/ingest-evidence.sh \
            --row out/evidence-row.json \
            --db-path "$PWD/_db" \
            --tool "$INPUT_TOOL" \
            --version "$INPUT_TOOL_VERSION"
