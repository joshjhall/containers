# Cross-compile the stibbons host CLI for all supported host targets and
# publish the binaries as GitHub Release assets (issue #286).
#
# stibbons is the host-facing successor to the legacy Go `igor` binary. Rather
# than committing a fat binary to git, we build one artifact per target triple
# on tag push and attach them to the same Release that ci.yml creates.
#
# Cross-compilation strategy: native CI matrix (one runner per OS/arch), with
# rustup targets per triple. The Linux arm64 leg builds on a native
# `ubuntu-24.04-arm` runner (musl-gcc from musl-tools) rather than
# cross-compiling from amd64 — mirroring the proven native-arm64 pattern in
# evidence-run.yml. This avoids the aws-lc-sys C build needing an aarch64
# cross sysroot (missing target libc/kernel headers, #724).
name: Release Binaries (stibbons)

on:
  push:
    tags: ["v*"]
  # Manual dispatch builds the binaries without uploading (no tag context),
  # useful for validating the matrix and size gate on a branch.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    env:
      # Read the coordinates into env rather than interpolating ${{ }} into
      # run: scripts (injection-safe; matches the repo's workflow guardrails).
      TARGET: ${{ matrix.target }}
    steps:
      - name: Disable CRLF conversion
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Force HTTPS for git dependencies
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: "1.97"
          targets: ${{ matrix.target }}

      - name: Install musl toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Both Linux legs now build natively (amd64 on ubuntu-latest, arm64 on
          # ubuntu-24.04-arm), so each links with musl-gcc from musl-tools — no
          # aarch64 cross-linker or cross sysroot required (#724).
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Per-target key so artifacts for different triples don't collide.
          key: ${{ matrix.target }}

      - name: Build stibbons (dist)
        shell: bash
        run: |
          # Every leg builds natively for its own arch, so cargo's default
          # linker for each `*-musl` target (musl-gcc from musl-tools on Linux)
          # is correct — no CARGO_TARGET_<triple>_LINKER override needed.
          # The `dist` profile carries the size tuning (issue #700 scopes it off
          # the workspace-wide `release` profile); it outputs to target/<triple>/dist/.
          cargo build --profile dist --target "$TARGET" -p stibbons

      - name: Package artifact
        id: package
        shell: bash
        # Naming, the 15 MB size gate, the checksum, and the Windows 7z presence
        # check live in bin/package-stibbons-artifact.sh so they can be
        # unit-tested outside of a release run (tests/unit/package-stibbons-artifact.sh).
        # TARGET is the job-level env; RUNNER_OS is provided by GitHub; VERSION
        # defaults to the repo-root VERSION file inside the script.
        run: ./bin/package-stibbons-artifact.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: stibbons-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Attach binaries to release
    runs-on: ubuntu-latest
    needs: build
    # Only publish on a real tag push — workflow_dispatch has no release to
    # attach to and just validates the build matrix above.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # ci.yml's release job creates the GitHub Release for this tag; this job
      # only appends the stibbons binaries. If that release is already
      # immutable, action-gh-release returns 422 on asset upload — skip in that
      # case (the binaries are still retained as workflow artifacts above).
      - name: Check release immutability
        id: release_state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GH_REPO: ${{ github.repository }}
        run: |
          IMMUTABLE=$(gh api "repos/${GH_REPO}/releases/tags/${VERSION}" \
            --jq '.immutable // false' 2>/dev/null || echo "false")
          if [ "${IMMUTABLE}" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release ${VERSION} is immutable — skipping asset upload."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach binaries to GitHub Release
        if: steps.release_state.outputs.skip != 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          token: ${{ secrets.GITHUB_TOKEN }}
