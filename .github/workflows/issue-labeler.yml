name: Issue Labeler

# Translates the Severity/Effort dropdowns from the form-based issue templates
# (.github/ISSUE_TEMPLATE/*.yml) into `severity/*` and `effort/*` labels so every
# web-UI issue is visible to /next-issue priority ordering. Issues filed without
# those selections get a `needs-triage` label and a one-time nudge comment.

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

# Serialize per-issue so rapid edits don't race on label/comment mutations.
concurrency:
  group: issue-labeler-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  label:
    name: Apply severity/effort labels
    runs-on: ubuntu-latest
    steps:
      - name: Map dropdowns to labels
        uses: actions/github-script@v7
        with:
          script: |
            const NEEDS_TRIAGE = 'needs-triage';
            const COMMENT_MARKER = '<!-- issue-labeler:needs-triage -->';

            // GitHub renders each form dropdown as a "### <Label>" heading
            // followed by the selected option text. Options look like
            // "medium — Increases maintenance burden…"; we want the leading
            // keyword ("medium"). "_No response_" means nothing was selected.
            const SEVERITIES = ['critical', 'high', 'medium', 'low'];
            const EFFORTS = ['trivial', 'small', 'medium', 'large'];

            function sectionValue(body, heading) {
              // Capture the first non-empty line under "### <heading>".
              const re = new RegExp(
                '^###\\s+' + heading + '\\s*$\\n+([^\\n]+)',
                'im',
              );
              const m = body.match(re);
              if (!m) return null;
              const value = m[1].trim();
              if (!value || value === '_No response_') return null;
              return value;
            }

            function keyword(value, allowed) {
              if (!value) return null;
              // Leading token before whitespace or an em/en/hyphen dash.
              const token = value.split(/[\s—–-]/)[0].toLowerCase();
              return allowed.includes(token) ? token : null;
            }

            const body = context.payload.issue.body || '';
            const severity = keyword(sectionValue(body, 'Severity'), SEVERITIES);
            const effort = keyword(sectionValue(body, 'Effort'), EFFORTS);

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;

            const toAdd = [];
            if (severity) toAdd.push(`severity/${severity}`);
            if (effort) toAdd.push(`effort/${effort}`);

            const current = context.payload.issue.labels.map((l) => l.name);

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: toAdd,
              });
              core.info(`Applied: ${toAdd.join(', ')}`);
              // A prior run may have flagged this issue before it was edited
              // to include selections — clear the stale triage flag.
              if (current.includes(NEEDS_TRIAGE)) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: NEEDS_TRIAGE,
                });
                core.info('Removed stale needs-triage label.');
              }
              return;
            }

            // No selections parsed: flag for triage (idempotently).
            core.info('No severity/effort selections found — flagging triage.');

            try {
              await github.rest.issues.getLabel({ owner, repo, name: NEEDS_TRIAGE });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: NEEDS_TRIAGE,
                  color: 'D4C5F9',
                  description: 'Missing severity/effort labels — needs manual triage',
                });
                core.info('Created needs-triage label.');
              } else {
                throw err;
              }
            }

            if (!current.includes(NEEDS_TRIAGE)) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [NEEDS_TRIAGE],
              });
            }

            // Post the nudge comment at most once (guarded by a hidden marker).
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const alreadyNudged = comments.some((c) =>
              (c.body || '').includes(COMMENT_MARKER),
            );
            if (!alreadyNudged) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  COMMENT_MARKER +
                  '\nThis issue is missing `severity/*` and/or `effort/*` labels, ' +
                  'so `/next-issue` can\'t prioritize it. Please refile via a ' +
                  '[form template](https://github.com/joshjhall/containers/issues/new/choose) ' +
                  'or add the labels manually. See ' +
                  '[`docs/development/filing-issues.md`](https://github.com/joshjhall/containers/blob/main/docs/development/filing-issues.md).',
              });
              core.info('Posted needs-triage nudge comment.');
            }
