services:
  devcontainer:
    build:
      context: .. # Containers root
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: mcr.microsoft.com/devcontainers/base:trixie
        PROJECT_NAME: containers
        USERNAME: vscode
        WORKING_DIR: /workspace/containers
        # Enable passwordless sudo for development (allows entrypoint to fix Docker socket)
        ENABLE_PASSWORDLESS_SUDO: "true"
        # Main dev tools
        INCLUDE_DEV_TOOLS: "true"
        # Node.js (required for MCP servers and bash-language-server)
        INCLUDE_NODE: "true"
        # Additional dev tools
        INCLUDE_OP: "true"
        INCLUDE_DOCKER: "true"
        # Report Claude agent state to the host monitor (Bartender Top Shelf)
        INCLUDE_HOST_EVENTS: "true"
        # Rust needed for stibbons (project scaffolding CLI) and luggage (containers runtime and install management)
        INCLUDE_RUST_DEV: "true"
        # Pin the toolchain explicitly so the build never floats to a newer
        # patch (e.g. 1.97.2) when one is released. Bump deliberately.
        RUST_VERSION: "1.97.1"
      cache_from:
        - type=local,src=/tmp/.buildx-cache
      cache_to:
        - type=local,dest=/tmp/.buildx-cache,mode=max
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/workspace/containers
      - ../../containers-db:/workspace/containers-db
      # Named cache volumes — survive image rebuilds, independently droppable,
      # and project-namespaced (containers-*) to avoid collisions with other
      # Rust projects sharing this Docker host. Ownership is reconciled to the
      # runtime user on startup by the entrypoint's fix_cache_permissions().
      - containers-cargo-registry:/cache/cargo/registry
      - containers-cargo-git:/cache/cargo/git
      - containers-rustup:/cache/rustup
      # codegraph index: <project>/.codegraph is symlinked here by the dev-tools
      # first-startup hook, so the knowledge-graph index lives on this volume
      # (out of the git tree, droppable to force a clean re-index).
      - containers-codegraph:/cache/codegraph
    tmpfs:
      # 1Password cache is kept in memory. No uid=/gid= for the same reason — this
      # path is under /cache, so fix_cache_permissions aligns it to the runtime user.
      - /cache/1password/secrets:size=8m,mode=0700
    # Load environment variables from ../.env if present (optional; the file is
    # gitignored local state and is absent in fresh git worktrees). Long-form
    # `required: false` mirrors examples/**/docker-compose.yml so the compose
    # validation hook passes from worktrees instead of erroring on a missing
    # env file.
    env_file:
      - path: ../.env
        required: false
    environment:
      # Default MCPs (unset = filesystem + figma-desktop + codegraph). This
      # explicit list REPLACES the default set, so codegraph is named here to
      # keep it default-on for this project.
      CLAUDE_MCPS: "filesystem,codegraph"
      # Default memory path
      MEMORY_FILE_PATH: "/workspace/containers/.claude/memory"
      SKIP_CASE_CHECK: "true"
    # Use tini as init system for proper zombie process reaping
    # This is a belt-and-suspenders approach - the Dockerfile also includes tini,
    # but init: true ensures proper PID 1 behavior even if command overrides entrypoint
    init: true
    # Required for bindfs FUSE overlay (fixes macOS VirtioFS permission issues)
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    # Entrypoint handles Docker socket permissions via sudo (no root needed)
    # devcontainer.json sets overrideCommand: false so our ENTRYPOINT runs
    command: ["sleep", "infinity"]
    # Health check configuration (inherits from Dockerfile)
    # Override if needed: healthcheck: {test: ["CMD", "healthcheck", "--verbose"]}
    networks:
      - containers-network

networks:
  containers-network:
    driver: bridge

volumes:
  # Rust caches: split into the genuinely cacheable cargo subdirs (registry +
  # git) rather than all of CARGO_HOME. CARGO_HOME=/cache/cargo and
  # RUSTUP_HOME=/cache/rustup are set in-image by the rust feature.
  containers-cargo-registry:
  containers-cargo-git:
  containers-rustup:
  # codegraph knowledge-graph index (see the .codegraph symlink note above).
  containers-codegraph:
