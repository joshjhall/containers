schema_version: 1
containers_dir: containers
project:
  name: myapp
  username: developer
  base_image: "debian:trixie-slim"
features:
  - python
  - python_dev
  - postgres_client
agents:
  max: 3
  network: myapp-dev-network
services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=devpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    port: 5432
    per_agent_db: true
  redis:
    image: redis:7
    port: 6379
